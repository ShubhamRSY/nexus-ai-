# Staging overlay — use with production compose:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# Requires the same secrets as production (.env) but deploys a staging image/tag.

services:
  caddy:
    environment:
      DOMAIN: ${STAGING_DOMAIN:-staging.${DOMAIN}}

  nexus:
    image: ghcr.io/shubhamrsy/nexus-ai:staging
    environment:
      APP_ENV: staging
      CORS_ORIGINS: ${STAGING_CORS_ORIGINS:-https://${STAGING_DOMAIN}}
      DEMO_MODE: "false"
      AUTH_REQUIRED: "true"
      ALLOW_REGISTRATION: "false"
